services:
  app:
    build:
      context: .
    container_name: ia-app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
    depends_on:
      - presidio-analyzer
      - presidio-anonymizer
    restart: unless-stopped

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer
    container_name: presidio-analyzer
    ports:
      - "3000:3000"
    restart: unless-stopped

  presidio-anonymizer:
    build:
      context: ./services/presidio-anonymizer
    container_name: presidio-anonymizer
    environment:
      PORT: 3000
    ports:
      - "3001:3000"
    restart: unless-stopped
